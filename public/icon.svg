<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Red Thread corgi icon</title>
  <desc id="desc">Close-up flat pixel art corgi face on a black background with a red thread accent.</desc>
  <rect width="512" height="512" rx="96" fill="#08090b"/>
  <path d="M40 206 C124 132 194 256 278 188 S386 116 472 202" fill="none" stroke="#c93542" stroke-width="24" stroke-linecap="round"/>

  <!-- Pixel blocks use a 16px grid for a deliberately low-bit corgi look. -->
  <g shape-rendering="crispEdges">
    <rect x="64" y="80" width="112" height="128" fill="#8b5b2b"/>
    <rect x="336" y="80" width="112" height="128" fill="#8b5b2b"/>
    <rect x="80" y="184" width="112" height="104" fill="#b87732"/>
    <rect x="320" y="184" width="112" height="104" fill="#b87732"/>
    <rect x="96" y="128" width="320" height="320" fill="#c98235"/>
    <rect x="160" y="96" width="192" height="72" fill="#d59142"/>
    <rect x="88" y="232" width="336" height="128" fill="#d59142"/>

    <rect x="168" y="176" width="176" height="264" fill="#f4ead3"/>
    <rect x="128" y="248" width="72" height="128" fill="#f4ead3"/>
    <rect x="312" y="248" width="72" height="128" fill="#f4ead3"/>
    <rect x="200" y="400" width="112" height="40" fill="#f4ead3"/>

    <rect x="152" y="240" width="48" height="48" fill="#111"/>
    <rect x="312" y="240" width="48" height="48" fill="#111"/>
    <rect x="176" y="224" width="16" height="16" fill="#fff"/>
    <rect x="336" y="224" width="16" height="16" fill="#fff"/>
    <rect x="232" y="312" width="48" height="48" fill="#111"/>
    <rect x="216" y="376" width="80" height="16" fill="#111"/>
    <rect x="200" y="360" width="24" height="16" fill="#111"/>
    <rect x="288" y="360" width="24" height="16" fill="#111"/>

    <rect x="0" y="480" width="512" height="32" fill="#08090b"/>
  </g>
</svg>
