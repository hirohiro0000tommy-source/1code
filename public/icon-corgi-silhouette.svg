    <rect x="176" y="224" width="32" height="32" fill="#08090b"/>
    <rect x="304" y="224" width="32" height="32" fill="#08090b"/>
    <rect x="240" y="272" width="32" height="32" fill="#08090b"/>
    <rect x="224" y="320" width="64" height="16" fill="#08090b"/>
    <rect x="160" y="384" width="192" height="48" fill="#f5f1e7"/>
    <rect x="128" y="432" width="80" height="32" fill="#f5f1e7"/>
